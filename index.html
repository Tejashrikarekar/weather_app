<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>AI Weather Center</title>
   <style>
       /* Modern UI Design */
       body {
           font-family: 'Segoe UI', sans-serif;
           background: linear-gradient(135deg, #0f172a, #1e293b);
           color: white;
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           margin: 0;
       }
       .weather-card {
           background: rgba(255, 255, 255, 0.05);
           padding: 30px;
           border-radius: 24px;
           backdrop-filter: blur(12px);
           border: 1px solid rgba(255, 255, 255, 0.1);
           text-align: center;
           width: 350px;
           box-shadow: 0 20px 50px rgba(0,0,0,0.3);
       }
       input {
           width: 80%;
           padding: 12px;
           border-radius: 12px;
           border: none;
           margin-bottom: 15px;
           background: rgba(255, 255, 255, 0.1);
           color: white;
           outline: none;
           text-align: center;
       }
       button {
           width: 88%;
           padding: 12px;
           border-radius: 12px;
           border: none;
           background: #38bdf8;
           color: #0f172a;
           font-weight: bold;
           cursor: pointer;
           transition: 0.3s;
       }
       button:hover { background: #7dd3fc; }
       #display { margin-top: 25px; }
       .temp { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #38bdf8; }
       .city-name { font-size: 1.5rem; opacity: 0.9; }
       .loader { font-style: italic; color: #94a3b8; }
   </style>
</head>
<body>


   <div class="weather-card">
       <h2>Weather AI</h2>
       <input type="text" id="cityInput" placeholder="Enter city (e.g. Mumbai)">
       <button onclick="getWeather()">Check Weather</button>


       <div id="display">
           <p>Enter a city to see the forecast!</p>
       </div>
   </div>


   <script>
       async function getWeather() {
           const city = document.getElementById('cityInput').value;
           const display = document.getElementById('display');


           if (!city) {
               alert("Please enter a city name!");
               return;
           }


           display.innerHTML = '<p class="loader">Scanning atmosphere...</p>';


           try {
               // Step 1: Convert City Name to Coordinates (Latitude/Longitude)
               const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`;
               const geoRes = await fetch(geoUrl);
               const geoData = await geoRes.json();


               if (!geoData.results || geoData.results.length === 0) {
                   display.innerHTML = "City not found. Try another!";
                   return;
               }


               const { latitude, longitude, name, country } = geoData.results[0];


               // Step 2: Get Weather Data using those coordinates
               const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`;
               const weatherRes = await fetch(weatherUrl);
               const weatherData = await weatherRes.json();


               const temp = weatherData.current_weather.temperature;
               const wind = weatherData.current_weather.windspeed;


               // Step 3: Show the data
               display.innerHTML = `
                   <div class="city-name">${name}, ${country}</div>
                   <div class="temp">${Math.round(temp)}°C</div>
                   <p>Wind Speed: ${wind} km/h</p>
                   <p style="color: #4ade80;">AI Confidence: 98%</p>
               `;


           } catch (error) {
               display.innerHTML = " Connection Error. Please check internet.";
               console.error(error);
           }
       }
   </script>
</body>
</html>
